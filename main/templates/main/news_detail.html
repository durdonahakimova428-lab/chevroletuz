{% extends "main/base.html" %}
{% block title %}{{ news.title }} — ChevroletUz{% endblock %}
{% block content %}
<div class="container" style="padding:40px 24px; max-width:820px;">
  <img src="{{ news.image.url }}" alt="{{ news.title }}" style="width:100%; border-radius:8px; margin-bottom:24px;">
  <h1 style="font-size:30px; font-weight:800;">{{ news.title }}</h1>
  <p style="color:var(--gray); font-size:14px;">{{ news.published_at|date:"d.m.Y" }}</p>
  <div style="line-height:1.8; font-size:16px;">{{ news.content|linebreaks }}</div>
</div>
{% endblock %}
